        npm run dev &
        until wget -q -O /dev/null http://127.0.0.1:5002/api-docs 2>/dev/null; do sleep 2; done &&
        ./node_modules/.bin/sequelize-cli db:seed:all 2>&1 || echo 'Seeds already applied or failed (non-fatal)' &&
        wait
      "
    environment:
      - NODE_ENV=development
      - PORT=5002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_DATABASE=ProductsMS
      - DB_POSTGRESQL_CONNECTION=Host=postgres;Database=ProductsMS;Username=postgres;Password=root;Port=5432
      - MICROSERVICES_KARDEX_API=http://kardex:5006
      - MICROSERVICES_MAILS_API=http://mails:5008
      - MICROSERVICES_AUDITLOGS_API=http://audit-logs:5007
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - totalchain-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5002/api-docs/"]
      interval: 10s
