version: "3.8"

volumes:
  postgres_data:

networks:
  totalchain-net:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - totalchain-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  users-manager:
    build:
      context: ./TotalChainEcommerceMicroServicesApiNode/UsersManagerMicroService
      dockerfile: Dockerfile
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - ./TotalChainEcommerceMicroServicesApiNode/UsersManagerMicroService/.env
    ports:
      - "5001:5001"
    command: >
      sh -c "
        npm run dev &
        until wget -q -O /dev/null http://127.0.0.1:5001/api-docs 2>/dev/null; do sleep 2; done &&
        echo '=== Running seeds ===' &&
        ./node_modules/.bin/sequelize-cli db:seed:all 2>&1 || echo 'Seeds already applied or failed (non-fatal)' &&
        echo '=== Seeds done ===' &&
        wait
      "
    environment:
      - NODE_ENV=development
      - PORT=5001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_DATABASE=UsersManagerMS
      - DB_POSTGRESQL_CONNECTION=Host=postgres;Database=UsersManagerMS;Username=postgres;Password=root;Port=5432
      - MICROSERVICES_AUDITLOGS_API=http://audit-logs:5007
      - MICROSERVICES_MAILS_API=http://mails:5008
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - totalchain-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5001/api-docs/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  products:
    build:
      context: ./TotalChainEcommerceMicroServicesApiNode/ProductsMicroService
